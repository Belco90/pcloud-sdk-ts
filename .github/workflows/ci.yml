name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: ${{ matrix.script }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - format:check
          - lint
          - type-check
          - test
          - build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: ${{ matrix.script }}
        run: pnpm ${{ matrix.script }}
